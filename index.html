<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGC Brand Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--text-main); }

        .date-display {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-banner {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .status-complete {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        .section {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: var(--accent-hover); }
        .btn-delete {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 5px 10px;
            font-size: 0.8rem;
        }
        .btn-delete:hover { border-color: var(--danger); color: var(--danger); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .tracker-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .tracker-info h3 { margin-bottom: 5px; }
        .tracker-info p { color: var(--text-muted); font-size: 0.9rem; }

        .checkmarks {
            display: flex;
            gap: 15px;
        }

        .check-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .check-box input {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .check-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .input-group { grid-template-columns: 1fr; }
            .tracker-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .checkmarks { width: 100%; justify-content: space-around; }
        }
    </style>
</head>
<body>

    <header>
        <h1>UGC Tracker</h1>
        <div class="date-display" id="currentDate">Loading date...</div>
        <div class="status-banner" id="statusBanner">Loading status...</div>
    </header>

    <!-- Brand Management Section -->
    <div class="section">
        <h2>Brand Deals</h2>
        <div class="input-group">
            <input type="text" id="brandName" placeholder="Brand Name (e.g., Trips.com)">
            <input type="text" id="brandHandles" placeholder="Handles (e.g., @trips, @ugccreator)">
            <input type="number" id="postsPerDay" placeholder="Posts/Day" min="1" max="10" value="3">
            <button class="btn" onclick="addBrand()">+ Add</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Brand</th>
                    <th>Handles</th>
                    <th>Required Posts</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="brandTableBody">
                <!-- Brands will be injected here via JS -->
            </tbody>
        </table>
    </div>

    <!-- Daily Tracker Section -->
    <div class="section">
        <h2>Today's Checklist</h2>
        <div id="trackerList">
            <!-- Daily checkboxes will be injected here via JS -->
        </div>
    </div>

    <script>
        // --- LocalStorage Keys ---
        const BRANDS_KEY = 'ugc_brands';
        const PROGRESS_KEY = 'ugc_progress';

        // --- Data Structures ---
        let brands = JSON.parse(localStorage.getItem(BRANDS_KEY)) || [];
        let progress = JSON.parse(localStorage.getItem(PROGRESS_KEY)) || { date: '', checked: {} };

        // --- Date Management ---
        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0]; // YYYY-MM-DD
        }

        function checkDailyReset() {
            const today = getTodayString();
            if (progress.date !== today) {
                // It's a new day, reset the checkboxes
                progress = { date: today, checked: {} };
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
            }
        }

        function displayDate() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('en-US', options);
        }

        // --- Brand Management ---
        function saveBrands() {
            localStorage.setItem(BRANDS_KEY, JSON.stringify(brands));
        }

        function addBrand() {
            const nameInput = document.getElementById('brandName');
            const handlesInput = document.getElementById('brandHandles');
            const postsInput = document.getElementById('postsPerDay');

            const name = nameInput.value.trim();
            const handles = handlesInput.value.trim();
            const posts = parseInt(postsInput.value) || 1;

            if (!name) {
                alert('Please enter a brand name.');
                return;
            }

            brands.push({
                id: Date.now().toString(), // unique ID
                name: name,
                handles: handles,
                postsPerDay: posts
            });

            saveBrands();
            nameInput.value = '';
            handlesInput.value = '';
            postsInput.value = '3';
            
            renderAll();
        }

        function deleteBrand(id) {
            brands = brands.filter(b => b.id !== id);
            // Clean up progress for deleted brand
            Object.keys(progress.checked).forEach(key => {
                if (key.startsWith(id + '_')) {
                    delete progress.checked[key];
                }
            });
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
            saveBrands();
            renderAll();
        }

        function renderBrandTable() {
            const tbody = document.getElementById('brandTableBody');
            if (brands.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No brands added yet. Add your first deal above!</td></tr>`;
                return;
            }

            tbody.innerHTML = brands.map(brand => `
                <tr>
                    <td><strong>${brand.name}</strong></td>
                    <td>${brand.handles || 'N/A'}</td>
                    <td>${brand.postsPerDay} / day</td>
                    <td><button class="btn-delete" onclick="deleteBrand('${brand.id}')">Remove</button></td>
                </tr>
            `).join('');
        }

        // --- Daily Tracker ---
        function toggleCheckbox(brandId, postIndex) {
            const checkboxId = `${brandId}_${postIndex}`;
            progress.checked[checkboxId] = !progress.checked[checkboxId];
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
            updateStatus();
        }

        function renderTracker() {
            const trackerList = document.getElementById('trackerList');
            
            if (brands.length === 0) {
                trackerList.innerHTML = `<div class="empty-state">Add brands to generate your daily checklist.</div>`;
                return;
            }

            trackerList.innerHTML = brands.map(brand => {
                // Generate the required number of checkboxes for this brand
                let checkboxes = '';
                for (let i = 1; i <= brand.postsPerDay; i++) {
                    const cbId = `${brand.id}_${i}`;
                    const isChecked = progress.checked[cbId] ? 'checked' : '';
                    checkboxes += `
                        <div class="check-box">
                            <input type="checkbox" id="${cbId}" ${isChecked} onclick="toggleCheckbox('${brand.id}', ${i})">
                            <label class="check-label" for="${cbId}">Post ${i}</label>
                        </div>
                    `;
                }

                return `
                    <div class="tracker-item">
                        <div class="tracker-info">
                            <h3>${brand.name}</h3>
                            <p>${brand.handles || ''}</p>
                        </div>
                        <div class="checkmarks">
                            ${checkboxes}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStatus() {
            const banner = document.getElementById('statusBanner');
            let totalRequired = 0;
            let totalCompleted = 0;

            
            brands.forEach(brand => {
                totalRequired += brand.postsPerDay;
                for (let i = 1; i <= brand.postsPerDay; i++) {
                    if (progress.checked[`${brand.id}_${i}`]) {
                        totalCompleted++;
                    }
                }
            });

            if (totalRequired === 0) {
                banner.textContent = 'Add a brand to get started';
                banner.className = 'status-banner';
            } else if (totalCompleted === totalRequired) {
                banner.textContent = `🎉 All done for today! (${totalCompleted}/${totalRequired})`;
                banner.className = 'status-banner status-complete';
            } else {
                banner.textContent = `Progress: ${totalCompleted} / ${totalRequired} posts completed today`;
                banner.className = 'status-banner';
            }
        }

        // --- Initial Render ---
        function renderAll() {
            checkDailyReset();
            displayDate();
            renderBrandTable();
            renderTracker();
            updateStatus();
        }

        // Run on load
        renderAll();

        // Check for date change every minute (in case the user leaves the tab open overnight)
        setInterval(checkDailyReset, 60000);
    </script>
</body>
</html>
